[colors]
background = #DD1C1C1E
background-bar = #1C1C1E
background-alt = #2A2A2C
foreground = #E6E6E6
primary = #FF4FA3
primary2 = #FF6BBF
secondary = #5AC8E9
alert = #FF453A
disabled = #7A7A80

[bar/top]
width = 100%
height = 26pt
radius = 8

background = ${colors.background}
foreground = ${colors.foreground}

border-bottom-size = 5px

line-size = 3pt

border-size = 0pt
border-color = #00000000

padding-left = 2
padding-right = 3

module-margin = 1

separator = •
separator-foreground = ${colors.disabled}

font-0 = monospace:size=10.5;1
font-1 = sans-serif:lang=zh:size=10;1
font-2 = sans-serif:size=10;1

modules-left = Arch Finder Files Edit Help xworkspaces
modules-center = xwindow
modules-right = systray pulseaudio backlight wlan date battery

cursor-click = pointer
cursor-scroll = pointer

enable-ipc = true

[bar/bat]
width = 8%
height = 5%
radius = 12

background = ${colors.background-bar}
foreground = ${colors.foreground}

separator = " "
separator-foreground = ${colors.disabled}

offset-x = 92%
offset-y = 3.5%

border-bottom-size = 5px

line-size = 3pt

border-size = 0pt
border-color = #00000000

padding-left = 2
padding-right = 3

module-margin = 1

cursor-click = pointer
cursor-scroll = pointer

override-redirect = true

font-0 = monospace:size=10.5;1
font-1 = sans-serif:lang=zh:size=10;1
font-2 = sans-serif:size=10;1


modules-left = powerpolicy
modules-right = power

enable-ipc = true

[bar/net]
width = 8%
height = 5%
radius = 12

background = ${colors.background-bar}
foreground = ${colors.foreground}

separator = " "
separator-foreground = ${colors.disabled}

offset-x = 85%
offset-y = 3.5%

border-bottom-size = 5px

line-size = 3pt

border-size = 0pt
border-color = #00000000

padding-left = 2
padding-right = 3

module-margin = 1

cursor-click = pointer
cursor-scroll = pointer

override-redirect = true

font-0 = monospace:size=10.5;1
font-1 = sans-serif:lang=zh:size=10;1
font-2 = sans-serif:size=10;1


modules-left = vpn
modules-right = bluetooth

enable-ipc = true


[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 8pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-foreground = ${colors.primary}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
label-foreground = ${colors.foreground}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected
[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %essid%
label-connected-foreground = ${colors.foreground}
format-connected = %{A1:polybar-msg -p $(cat $HOME/.config/polybar/pid/net.pid) cmd toggle:}%{A3:kitty nmtui:}<ramp-signal><label-connected>%{A}%{A}
label-disconnected = "󰤭 "
label-disconnected-foreground = ${colors.disabled}

ramp-signal-0 = "󰤟 "
ramp-signal-1 = "󰤢 "
ramp-signal-2 = "󰤥 "
ramp-signal-3 = "󰤨 "

[module/vpn]
type = custom/script
exec = "$HOME/.config/polybar/scripts/ts_state.sh"
click-left = "$HOME/.config/polybar/scripts/ts_toggle.sh"
click-right = "kitty -e sh -c 'tailscale status;zsh'"

[module/bluetooth]
type = custom/script
exec = "$HOME/.config/polybar/scripts/bluetooth.sh"
click-left = "kitty bluetoothctl"
click-right = "bluetoothctl power $(bluetoothctl show | grep -q "Powered: yes"  && echo "off" || echo "on")"
interval = 0.5
label-foreground = ${colors.foreground}

[module/date]
type = internal/date
interval = 1

date = %H:%M:%S
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary2}

[module/pulseaudio]
type = internal/pulseaudio

use-ui-max = false

format-volume-prefix-foreground = ${colors.primary}
format-volume = %{A3:pavucontrol:}<ramp-volume><label-volume>%{A3}

label-volume = %percentage%%
label-volume-foreground = ${colors.foreground}

label-muted = %{A3:pavucontrol:} %{A3}
label-muted-foreground = ${colors.disabled}

ramp-volume-0 = " "
ramp-volume-1 = " "
ramp-volume-2 = "󰕾 "
ramp-volume-3 = " "


[module/backlight]
type = custom/script
exec = brightnessctl info | grep "%" | awk -F'[()]' '{print "󰛨 " $2}'  

format-foreground = ${colors.foreground}
label = " %output% "

interval = 0.001
enable-scroll = true
scroll-up = sh -c "/usr/bin/brightnessctl set 1%+"
scroll-down =sh -c "/usr/bin/brightnessctl set 1%-"

[module/battery]
type = internal/battery

full-at = 99

battery = BAT0
adapter = ADP1

poll-interval = 5

format-charging = %{A1:polybar-msg -p $(cat $HOME/.config/polybar/pid/bat.pid) cmd toggle:}%{A3:kitty -e sh -c 'sudo tlp-stat -b; exec zsh':}<animation-charging> <label-charging>%{A}%{A}
format-discharging = %{A1:polybar-msg -p $(cat $HOME/.config/polybar/pid/bat.pid) cmd toggle:}%{A3:kitty -e sh -c 'sudo tlp-stat -b; exec zsh':}<ramp-capacity> <label-discharging>%{A}%{A}

label-charging = %percentage%%
label-charging-foreground = ${colors.foreground}

label-discharging = %percentage%%
label-discharging-foreground = ${colors.foreground}

label-full = %{F#8FBCBB}󱟢%{F-}  
label-full-foreground = ${colors.secondary}

ramp-capacity-0 = %{F#BF616A}%{F-}  
ramp-capacity-1 = %{F#D08770}%{F-}  
ramp-capacity-2 = %{F#EBCB8B}%{F-}  
ramp-capacity-3 = %{F#A3BE8C}%{F-}  
ramp-capacity-4 = %{F#A3BE8C}%{F-}  

animation-charging-0 = %{F#88C0D0}%{F-}  
animation-charging-1 = %{F#88C0D0}%{F-}  
animation-charging-2 = %{F#88C0D0}%{F-}  
animation-charging-3 = %{F#88C0D0}%{F-}  
animation-charging-4 = %{F#88C0D0}%{F-}  

animation-charging-framerate = 750

[module/powerpolicy]
type = custom/script
exec = "$HOME/.config/polybar/scripts/cpustate.sh"
click-left = "$HOME/.config/polybar/scripts/cpupower.sh"
interval = 0.5
label-foreground = ${colors.foreground}

[module/Arch]
type = custom/script
exec = echo "󰣇"

format = <label>
label-foreground = ${colors.primary}
label = %output%
click-left = "kitty -e sh -c 'fastfetch && sleep 1'"


[module/Finder]
type = custom/script
exec = echo "Finder"
click-left = "rofi -show"

[module/Files]
type = custom/script
exec = echo "Files"
click-left = "thunar"

[module/Edit]
type = custom/script
exec = echo "Edit"
click-left = "kitty nvim"

[module/Help]
type = custom/script
exec = echo "Help"
click-left = "firefox --new-window https://github.com/SydX-pages/dotfiles/blob/main/README.md"


[module/power]
type = custom/script
exec = echo "⏻"

click-left = "xfce4-session-logout"
label-foreground = ${colors.foreground}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[settings]
screenchange-reload = true
pseudo-transparency = true
